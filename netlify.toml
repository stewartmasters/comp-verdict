[build]
  command = "npm install && NODE_OPTIONS='--max-old-space-size=3072' npm run build"
  publish = "out"

[build.environment]
  NEXT_PUBLIC_BASE_URL = "https://www.compverdict.com"
  # GA4 Measurement ID — override in Netlify dashboard under Site settings > Environment variables
  # NEXT_PUBLIC_GA_ID = "G-PCW5JTQ8HY"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/salary/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
