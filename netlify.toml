[build]
  command = "npm install && npm run build"
  publish = "out"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/out/salary/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
