name: Monthly site rebuild

on:
  schedule:
    # 1st of each month at 05:00 UTC — refreshes "Updated Month Year" dates
    - cron: "0 5 1 * *"
  workflow_dispatch: {}

jobs:
  rebuild:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'
    steps:
      - name: Trigger Netlify deploy
        env:
          NETLIFY_DEPLOY_HOOK: ${{ secrets.NETLIFY_DEPLOY_HOOK }}
        run: |
          if [ -n "$NETLIFY_DEPLOY_HOOK" ]; then
            curl -s -X POST "$NETLIFY_DEPLOY_HOOK"
          fi
