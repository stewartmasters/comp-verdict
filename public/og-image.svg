<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#F8FAFC"/>
  <rect width="1200" height="630" fill="url(#grad)" opacity="0.05"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#2563EB"/>
  <!-- Brand -->
  <text x="80" y="200" font-family="Inter, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#0F172A" letter-spacing="-1">Comp<tspan fill="#2563EB">Verdict</tspan></text>
  <!-- Headline -->
  <text x="80" y="310" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#0F172A" letter-spacing="-2">Is this offer</text>
  <text x="80" y="400" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#0F172A" letter-spacing="-2">worth taking?</text>
  <!-- Sub -->
  <text x="80" y="480" font-family="Inter, -apple-system, sans-serif" font-size="28" fill="#475569">Enter your offer. Get a data-backed verdict in seconds.</text>
  <!-- Trust strip -->
  <text x="80" y="560" font-family="Inter, -apple-system, sans-serif" font-size="20" fill="#94A3B8">✓ 39 cities  ·  10 roles  ·  Updated Q1 2025  ·  Free · No sign-up</text>
</svg>
